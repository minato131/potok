<!-- templates/accounts/password_reset_complete.html -->
{% extends 'base.html' %}
{% load static %}

{% block title %}Пароль изменен · Поток{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-card-header">
            <div class="auth-logo">
                <span class="logo-icon">🌊</span>
                <span class="logo-text">Поток</span>
            </div>
            <div class="header-icon header-icon--success">
                <i data-feather="check-circle"></i>
            </div>
            <h1 class="auth-title">Пароль успешно изменен!</h1>
            <p class="auth-subtitle">
                Теперь вы можете войти в свой аккаунт с новым паролем.
            </p>
        </div>

        <div class="action-buttons">
            <a href="{% url 'accounts:login' %}" class="auth-submit-btn">
                <span>Войти в аккаунт</span>
                <i data-feather="log-in"></i>
            </a>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_css %}
<style>
    .auth-page {
        min-height: calc(100vh - 80px);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem 1.5rem;
    }

    .auth-card {
        width: 100%;
        max-width: 480px;
        background: var(--color-bg-surface);
        border-radius: 32px;
        padding: 2.5rem;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
        border: 1px solid var(--color-border-light);
    }

    .auth-card-header {
        text-align: center;
        margin-bottom: 2rem;
    }

    .auth-logo {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        margin-bottom: 1.5rem;
    }

    .logo-icon {
        font-size: 2rem;
    }

    .logo-text {
        font-size: 1.75rem;
        font-weight: 700;
        color: var(--color-primary);
    }

    .header-icon {
        width: 5rem;
        height: 5rem;
        border-radius: 25px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 1.5rem;
    }

    .header-icon--success {
        background: #d1fae5;
        color: #059669;
    }

    .header-icon i {
        width: 2.5rem;
        height: 2.5rem;
    }

    .auth-title {
        font-size: 1.75rem;
        font-weight: 700;
        color: var(--color-text-primary);
        margin-bottom: 0.75rem;
    }

    .auth-subtitle {
        color: var(--color-text-secondary);
        font-size: 0.9375rem;
        line-height: 1.6;
    }

    .action-buttons {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
    }

    .auth-submit-btn {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
        padding: 1rem 1.5rem;
        background: var(--color-primary);
        color: white;
        border: none;
        border-radius: 16px;
        font-size: 1.0625rem;
        font-weight: 600;
        text-decoration: none;
        cursor: pointer;
        transition: all 0.2s ease;
    }

    .auth-submit-btn:hover {
        background: var(--color-primary-hover);
        transform: translateY(-1px);
        box-shadow: 0 8px 20px rgba(37, 99, 235, 0.2);
    }

    .auth-submit-btn i {
        width: 1.25rem;
        height: 1.25rem;
    }

    @media (max-width: 600px) {
        .auth-card {
            padding: 2rem 1.5rem;
        }

        .auth-title {
            font-size: 1.5rem;
        }

        .header-icon {
            width: 4rem;
            height: 4rem;
        }

        .header-icon i {
            width: 2rem;
            height: 2rem;
        }
    }
</style>
{% endblock %}

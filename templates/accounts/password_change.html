{% extends 'base.html' %}

{% block title %}Смена пароля - Поток{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h4><i class="bi bi-key"></i> Смена пароля</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label for="id_old_password" class="form-label">Старый пароль</label>
                        <input type="password" name="old_password" class="form-control" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="id_new_password1" class="form-label">Новый пароль</label>
                        <input type="password" name="new_password1" class="form-control" required>
                        <small class="form-text text-muted">
                            Пароль должен содержать минимум 8 символов
                        </small>
                    </div>
                    
                    <div class="mb-3">
                        <label for="id_new_password2" class="form-label">Подтверждение пароля</label>
                        <input type="password" name="new_password2" class="form-control" required>
                    </div>
                    
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-check-lg"></i> Сменить пароль
                    </button>
                    <a href="{% url 'accounts:profile' %}" class="btn btn-secondary">
                        <i class="bi bi-x-lg"></i> Отмена
                    </a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% extends 'base.html' %}

{% block title %}Удаление поста - Поток{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-danger">
            <div class="card-header bg-danger text-white">
                <h4 class="mb-0"><i class="bi bi-exclamation-triangle"></i> Подтверждение удаления</h4>
            </div>
            <div class="card-body">
                <p class="lead">Вы уверены, что хотите удалить пост "{{ post.title }}"?</p>
                <p class="text-danger">
                    <i class="bi bi-info-circle"></i> Это действие нельзя отменить.
                </p>
                
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex justify-content-between">
                        <button type="submit" class="btn btn-danger">
                            <i class="bi bi-trash"></i> Да, удалить
                        </button>
                        <a href="{% url 'posts:post_detail' post.pk %}" class="btn btn-secondary">
                            <i class="bi bi-arrow-left"></i> Отмена
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
